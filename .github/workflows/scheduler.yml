name: Agendador

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Processar tarefas do TrilhaGov
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          SCHEDULER_TOKEN: ${{ secrets.SCHEDULER_TOKEN }}
        run: |
          if [ -z "$RENDER_APP_URL" ] || [ -z "$SCHEDULER_TOKEN" ]; then
            echo "::notice::Agendador aguardando os segredos do ambiente gratuito."
            exit 0
          fi

          curl \
            --fail \
            --show-error \
            --silent \
            --retry 5 \
            --retry-delay 20 \
            --retry-all-errors \
            --max-time 300 \
            --request POST \
            --header "Authorization: Bearer $SCHEDULER_TOKEN" \
            "$RENDER_APP_URL/api/internal/scheduler"
